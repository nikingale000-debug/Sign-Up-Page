<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
</head>

<body>

<hr>

<div align="center">
    <h3>Sign Up</h3>

    <table cellpadding="10" border="0">

        <tr>
            <td>Name :</td>
            <td><input type="text" placeholder="Full Name" required></td>
        </tr>

        <tr>
            <td>Username :</td>
            <td><input type="text" placeholder="Username" required></td>
        </tr>

        <tr>
            <td>Birthday :</td>
            <td><input type="date"></td>
        </tr>

        <tr>
            <td>Email :</td>
            <td> <input type="email" placeholder="Enter your email" required></td>
        </tr>

        <tr>
            <td colspan="2" align="center">
                <button>Save Email</button>
            </td>
        </tr>

        <tr>
            <td>Password :</td>
            <td><input type="password" placeholder="Password" required></td>
        </tr>

        <tr>
            <td colspan="2" align="center">
                <button>Sign Up</button>
            </td>
        </tr>

    </table>

</div>

<hr>

</body>
</html>
